<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DX Guardian - 完整演示</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        /* ===== 主题系统 ===== */
        :root[data-theme="blue"] {
            --bg-primary: #0a0e1a;
            --bg-secondary: #111827;
            --bg-card: #1f2937;
            --bg-card-hover: #374151;
            --accent-primary: #3b82f6;
            --accent-glow: #60a5fa;
            --accent-success: #10b981;
            --accent-warning: #f59e0b;
            --accent-danger: #ef4444;
            --accent-purple: #8b5cf6;
            --gradient-accent: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            --gradient-success: linear-gradient(135deg, #10b981 0%, #34d399 100%);
            --gradient-danger: linear-gradient(135deg, #ef4444 0%, #f87171 100%);
        }
        
        :root[data-theme="purple"] {
            --bg-primary: #0f0a1f;
            --bg-secondary: #1a1025;
            --bg-card: #2d1f3d;
            --bg-card-hover: #3d2a52;
            --accent-primary: #a78bfa;
            --accent-glow: #c4b5fd;
            --accent-success: #34d399;
            --gradient-accent: linear-gradient(135deg, #a78bfa 0%, #c084fc 100%);
            --gradient-success: linear-gradient(135deg, #34d399 0%, #6ee7b7 100%);
            --gradient-danger: linear-gradient(135deg, #f472b6 0%, #fb7185 100%);
        }
        
        :root[data-theme="green"] {
            --bg-primary: #051a0f;
            --bg-secondary: #0a291a;
            --bg-card: #143d2a;
            --bg-card-hover: #1f523a;
            --accent-primary: #10b981;
            --accent-glow: #34d399;
            --accent-success: #34d399;
            --gradient-accent: linear-gradient(135deg, #10b981 0%, #34d399 100%);
            --gradient-success: linear-gradient(135deg, #34d399 0%, #6ee7b7 100%);
            --gradient-danger: linear-gradient(135deg, #f87171 0%, #fca5a5 100%);
        }
        
        :root[data-theme="red"] {
            --bg-primary: #1a0a0a;
            --bg-secondary: #291010;
            --bg-card: #3d1f1f;
            --bg-card-hover: #522a2a;
            --accent-primary: #ef4444;
            --accent-glow: #f87171;
            --accent-success: #fbbf24;
            --gradient-accent: linear-gradient(135deg, #ef4444 0%, #f87171 100%);
            --gradient-success: linear-gradient(135deg, #fbbf24 0%, #fcd34d 100%);
            --gradient-danger: linear-gradient(135deg, #dc2626 0%, #ef4444 100%);
        }
        
        :root[data-theme="ocean"] {
            --bg-primary: #001a33;
            --bg-secondary: #002244;
            --bg-card: #003366;
            --bg-card-hover: #004477;
            --accent-primary: #00b4d8;
            --accent-glow: #90e0ef;
            --accent-success: #2ec4b6;
            --gradient-accent: linear-gradient(135deg, #00b4d8 0%, #7209b7 100%);
            --gradient-success: linear-gradient(135deg, #2ec4b6 0%, #48cae4 100%);
            --gradient-danger: linear-gradient(135deg, #ff6b6b 0%, #ff8e8e 100%);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: #f9fafb;
            overflow: hidden;
        }
        
        /* Top Bar */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 52px;
            background: rgba(17, 24, 39, 0.95);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            z-index: 1000;
            border-bottom: 1px solid rgba(148, 163, 184, 0.2);
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 16px;
            font-weight: bold;
            background: var(--gradient-accent);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .logo-icon {
            font-size: 20px;
            animation: rotate-satellite 10s linear infinite;
        }
        
        @keyframes rotate-satellite {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .band-filter {
            display: flex;
            gap: 6px;
        }
        
        .band-btn {
            padding: 4px 10px;
            background: var(--bg-card);
            border: 1px solid rgba(148, 163, 184, 0.1);
            color: #9ca3af;
            border-radius: 6px;
            font-size: 11px;
            cursor: pointer;
            white-space: nowrap;
        }
        
        .band-btn:hover { background: var(--bg-card-hover); border-color: var(--accent-glow); }
        .band-btn.active { background: var(--gradient-accent); color: white; border-color: transparent; }
        .band-count { background: rgba(255,255,255,0.2); padding: 1px 4px; border-radius: 4px; font-size: 9px; margin-left: 4px; }
        
        .top-bar-right { display: flex; align-items: center; gap: 8px; }
        
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            background: var(--bg-card);
            border-radius: 16px;
            font-size: 11px;
        }
        
        .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent-success); box-shadow: 0 0 6px var(--accent-success); }
        
        .theme-selector { position: relative; }
        .theme-btn {
            width: 32px; height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-card);
            border: 1px solid rgba(148, 163, 184, 0.1);
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }
        .theme-btn:hover { background: var(--bg-card-hover); transform: scale(1.05); }
        
        .theme-panel {
            position: absolute;
            top: 40px; right: 0;
            background: var(--bg-card);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 12px;
            padding: 12px;
            display: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 1001;
        }
        .theme-panel.show { display: block; }
        .theme-panel-title { font-size: 12px; font-weight: bold; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid rgba(148, 163, 184, 0.1); }
        .theme-options { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .theme-option {
            width: 40px; height: 40px;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid transparent;
            position: relative;
        }
        .theme-option:hover { transform: scale(1.1); border-color: white; }
        .theme-option.active { border-color: white; box-shadow: 0 0 12px rgba(255,255,255,0.5); }
        .theme-option[data-theme="blue"] { background: linear-gradient(135deg, #3b82f6, #8b5cf6); }
        .theme-option[data-theme="purple"] { background: linear-gradient(135deg, #a78bfa, #c084fc); }
        .theme-option[data-theme="green"] { background: linear-gradient(135deg, #10b981, #34d399); }
        .theme-option[data-theme="red"] { background: linear-gradient(135deg, #ef4444, #f87171); }
        .theme-option[data-theme="ocean"] { background: linear-gradient(135deg, #00b4d8, #7209b7); }
        .theme-name { position: absolute; bottom: 0; left: 0; right: 0; font-size: 7px; text-align: center; color: white; background: rgba(0,0,0,0.5); padding: 1px; }
        
        .notification-btn {
            width: 32px; height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-card);
            border: 1px solid rgba(148, 163, 184, 0.1);
            border-radius: 8px;
            cursor: pointer;
            position: relative;
        }
        .notification-btn .badge {
            position: absolute;
            top: -4px; right: -4px;
            background: var(--gradient-danger);
            color: white;
            font-size: 9px;
            font-weight: bold;
            padding: 2px 5px;
            border-radius: 8px;
        }
        .icon-btn {
            width: 30px; height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-card);
            border: 1px solid rgba(148, 163, 184, 0.1);
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        
        /* Main Layout - 地图居中 */
        .main-container {
            display: grid;
            grid-template-columns: 1fr 320px;  /* 地图 : 右侧面板 */
            gap: 12px;
            padding: 60px 12px 12px;
            height: 100vh;
        }
        
        /* 地图区域 - 完整空间 */
        .map-area {
            position: relative;
        }
        
        .map-container {
            position: relative;
            background: var(--bg-secondary);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(148, 163, 184, 0.2);
            width: 100%;
            height: 100%;
        }
        
        #map { width: 100%; height: 100%; }
        
        /* Right Panel */
        .right-panel {
            display: flex;
            flex-direction: column;
            gap: 8px;
            overflow-y: auto;
            padding-right: 4px;
        }
        
        .card {
            background: var(--bg-card);
            border: 1px solid rgba(148, 163, 184, 0.1);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.4);
            flex-shrink: 0;
        }
        
        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            background: var(--gradient-accent);
            color: white;
            font-size: 12px;
            font-weight: bold;
        }
        
        .card-body { padding: 12px; }
        
        /* Solar Grid */
        .solar-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .solar-stat { text-align: center; padding: 8px; background: var(--bg-secondary); border-radius: 6px; border: 1px solid rgba(148, 163, 184, 0.1); }
        .stat-label { font-size: 9px; color: #6b7280; }
        .stat-value { font-size: 16px; font-weight: bold; margin: 4px 0; background: var(--gradient-accent); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .stat-trend { font-size: 9px; }
        .stat-trend.up { color: var(--accent-success); }
        .stat-trend.down { color: var(--accent-danger); }
        
        /* Status Grid */
        .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .status-item { padding: 6px; background: var(--bg-secondary); border-radius: 6px; }
        .status-label { font-size: 9px; color: #6b7280; margin-bottom: 2px; }
        .status-value { font-size: 14px; font-weight: bold; color: #f9fafb; }
        
        /* Station Info */
        .station-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 11px; }
        .station-label { color: #6b7280; }
        .station-value { color: #f9fafb; font-weight: bold; }
        
        /* Tabs */
        .card-tabs { flex: 1; display: flex; flex-direction: column; min-height: 280px; }
        .tab-header { display: flex; gap: 0; background: var(--bg-secondary); padding: 3px; }
        .tab-btn { flex: 1; padding: 8px 6px; background: transparent; border: none; color: #9ca3af; cursor: pointer; border-radius: 6px; font-size: 11px; }
        .tab-btn.active { background: var(--gradient-accent); color: white; }
        .tab-content { flex: 1; overflow-y: auto; padding: 10px; }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }
        
        /* Watchlist */
        .watchlist-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            background: var(--bg-secondary);
            border-radius: 6px;
            margin-bottom: 6px;
            border-left: 3px solid var(--accent-success);
        }
        .wl-call { font-weight: bold; color: #f9fafb; font-size: 12px; }
        .wl-type { font-size: 9px; color: #6b7280; padding: 1px 4px; background: rgba(255,255,255,0.1); border-radius: 3px; }
        .btn-add {
            width: 100%;
            padding: 6px;
            background: var(--bg-secondary);
            border: 1px dashed rgba(148, 163, 184, 0.2);
            color: #6b7280;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
        }
        .btn-add:hover { border-color: var(--accent-glow); color: #f9fafb; }
        
        /* Alert */
        .alert-item {
            padding: 8px;
            background: var(--bg-secondary);
            border-radius: 6px;
            margin-bottom: 6px;
            border-left: 3px solid var(--accent-danger);
            animation: slideIn 0.4s ease;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .alert-title { font-weight: bold; font-size: 11px; color: #f9fafb; margin-bottom: 3px; }
        .alert-detail { font-size: 10px; color: #9ca3af; }
        .alert-badge { display: inline-block; font-size: 8px; padding: 1px 3px; border-radius: 3px; background: var(--gradient-danger); color: white; margin-right: 4px; }
        .alert-badge.important { background: var(--gradient-warning); }
        .alert-badge.normal { background: var(--gradient-success); }
        
        /* Opportunity */
        .opportunity-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px;
            background: var(--bg-secondary);
            border-radius: 6px;
            margin-bottom: 6px;
        }
        .opp-call { font-weight: bold; color: #f9fafb; font-size: 12px; }
        .opp-info { font-size: 10px; color: #9ca3af; }
        .opp-score { background: var(--gradient-success); color: white; font-size: 11px; font-weight: bold; padding: 3px 8px; border-radius: 4px; }
        
        /* Spot Marker */
        .spot-marker { background: none !important; border: none !important; }
        .spot-pin { position: relative; }
        .spot-dot {
            width: 16px; height: 16px;
            border-radius: 50%;
            background: var(--gradient-accent);
            border: 3px solid white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.5), 0 0 12px var(--accent-glow);
            animation: pulse-float 3s ease-in-out infinite;
        }
        @keyframes pulse-float {
            0%, 100% { transform: scale(1) translateY(0); }
            50% { transform: scale(1.1) translateY(-4px); }
        }
        
        /* Custom Popup */
        .leaflet-popup-content-wrapper {
            background: var(--bg-card);
            color: #f9fafb;
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 8px;
        }
        .leaflet-popup-tip { background: var(--bg-card); }
        .spot-popup { font-size: 12px; }
        .spot-popup-title { font-weight: bold; color: var(--accent-primary); margin-bottom: 6px; }
        .spot-popup-row { display: flex; justify-content: space-between; padding: 3px 0; font-size: 11px; }
        .spot-popup-label { color: #9ca3af; }
        .spot-popup-value { color: #f9fafb; font-weight: bold; }
        
        /* Bottom Status */
        .bottom-status {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 24px;
            background: var(--bg-secondary);
            border-top: 1px solid rgba(148, 163, 184, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            font-size: 11px;
            color: #6b7280;
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: var(--bg-secondary); }
        ::-webkit-scrollbar-thumb { background: var(--bg-card-hover); border-radius: 3px; }
    </style>
</head>
<body>
    <!-- Top Bar -->
    <header class="top-bar">
        <div style="display: flex; align-items: center; gap: 12px;">
            <div class="logo">
                <span class="logo-icon">📡</span>
                <span class="logo-text">DX Guardian</span>
            </div>
            <!-- Band Filter -->
            <div class="band-filter">
                <button class="band-btn" onclick="filterBand('all')">全部</button>
                <button class="band-btn" onclick="filterBand('160m')">160m</button>
                <button class="band-btn" onclick="filterBand('80m')">80m</button>
                <button class="band-btn" onclick="filterBand('40m')">40m</button>
                <button class="band-btn active" data-band="20m" onclick="filterBand('20m')">
                    20m <span class="band-count" id="count-20m">0</span>
                </button>
                <button class="band-btn" data-band="15m" onclick="filterBand('15m')">
                    15m <span class="band-count" id="count-15m">0</span>
                </button>
                <button class="band-btn" data-band="10m" onclick="filterBand('10m')">
                    10m <span class="band-count" id="count-10m">0</span>
                </button>
            </div>
        </div>
        
        <div class="top-bar-right">
            <div class="status-indicator">
                <span class="status-dot"></span>
                <span>已连接</span>
            </div>
            
            <div class="theme-selector">
                <button class="theme-btn" onclick="toggleThemePanel()">🎨</button>
                <div class="theme-panel" id="theme-panel">
                    <div class="theme-panel-title">选择主题</div>
                    <div class="theme-options">
                        <div class="theme-option active" data-theme="blue" onclick="setTheme('blue')"><div class="theme-name">科技蓝</div></div>
                        <div class="theme-option" data-theme="purple" onclick="setTheme('purple')"><div class="theme-name">暗夜紫</div></div>
                        <div class="theme-option" data-theme="green" onclick="setTheme('green')"><div class="theme-name">翡翠绿</div></div>
                        <div class="theme-option" data-theme="red" onclick="setTheme('red')"><div class="theme-name">烈焰红</div></div>
                        <div class="theme-option" data-theme="ocean" onclick="setTheme('ocean')"><div class="theme-name">海洋蓝</div></div>
                    </div>
                </div>
            </div>
            
            <button class="notification-btn">
                <span>🔔</span>
                <span class="badge" id="alert-badge">0</span>
            </button>
            <button class="icon-btn" onclick="toggleAutoSpots()" title="自动添加 Spot">▶️</button>
            <button class="icon-btn" onclick="clearSpots()" title="清除所有 Spot">🗑️</button>
        </div>
    </header>
    
    <!-- Main Container -->
    <div class="main-container">
        <!-- 地图区域 -->
        <div class="map-area">
            <div class="map-container">
                <div id="map"></div>
            </div>
        </div>
        
        <!-- 右侧面板 -->
        <div class="right-panel">
            <!-- 太阳数据卡片 -->
            <div class="card">
                <div class="card-header">
                    <span>☀️ 太阳数据</span>
                    <button class="icon-btn" style="width: 22px; height: 22px; font-size: 12px;" onclick="refreshSolar()">🔄</button>
                </div>
                <div class="card-body">
                    <div class="solar-grid">
                        <div class="solar-stat">
                            <div class="stat-label">SFI</div>
                            <div class="stat-value" id="solar-sfi">156</div>
                        </div>
                        <div class="solar-stat">
                            <div class="stat-label">SSN</div>
                            <div class="stat-value" id="solar-ssn">88</div>
                        </div>
                        <div class="solar-stat">
                            <div class="stat-label">K</div>
                            <div class="stat-value" id="solar-k">2.1</div>
                        </div>
                        <div class="solar-stat">
                            <div class="stat-label">A</div>
                            <div class="stat-value" id="solar-a">12</div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 系统状态卡片 -->
            <div class="card">
                <div class="card-header">🔌 系统状态</div>
                <div class="card-body">
                    <div class="status-grid">
                        <div class="status-item">
                            <div class="status-label">Spot 总数</div>
                            <div class="status-value" id="total-spots">0</div>
                        </div>
                        <div class="status-item">
                            <div class="status-label">活跃波段</div>
                            <div class="status-value" id="active-bands">0</div>
                        </div>
                        <div class="status-item">
                            <div class="status-label">运行时间</div>
                            <div class="status-value" id="uptime">0h 0m</div>
                        </div>
                        <div class="status-item">
                            <div class="status-label">Web Push</div>
                            <div class="status-value" style="color: var(--accent-success); font-size: 11px;">● 开启</div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 我的台站卡片 -->
            <div class="card">
                <div class="card-header">
                    <span>📡 我的台站</span>
                    <button class="icon-btn" style="width: 22px; height: 22px; font-size: 11px;" onclick="alert('编辑台站配置')">✏️</button>
                </div>
                <div class="card-body">
                    <div class="station-row">
                        <span class="station-label">呼号</span>
                        <span class="station-value">BG2ENW</span>
                    </div>
                    <div class="station-row">
                        <span class="station-label">Grid</span>
                        <span class="station-value">PN35HS</span>
                    </div>
                    <div class="station-row">
                        <span class="station-label">QTH</span>
                        <span class="station-value">哈尔滨</span>
                    </div>
                </div>
            </div>
            
            <!-- Tab 卡片 (关注/预警/推荐) -->
            <div class="card card-tabs">
                <div class="tab-header">
                    <button class="tab-btn active" onclick="switchTab('watchlist')">🎯 关注</button>
                    <button class="tab-btn" onclick="switchTab('alerts')">🔔 预警</button>
                    <button class="tab-btn" onclick="switchTab('opportunities')">✨ 推荐</button>
                </div>
                <div class="tab-content">
                    <!-- Watchlist -->
                    <div class="tab-panel active" id="tab-watchlist">
                        <div id="watchlist-container"></div>
                        <button class="btn-add" onclick="addWatchlistItem()">+ 添加关注</button>
                    </div>
                    
                    <!-- Alerts -->
                    <div class="tab-panel" id="tab-alerts">
                        <div id="alert-container"></div>
                    </div>
                    
                    <!-- Opportunities -->
                    <div class="tab-panel" id="tab-opportunities">
                        <div id="opportunity-container"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Bottom Status -->
    <div class="bottom-status">
        <div class="status-left">
            <span>📍 当前位置：PN35HS (哈尔滨)</span>
            <span>🌐 地图中心：Asia/East</span>
        </div>
        <div class="status-right">
            <span>🕐 数据范围：最近 4 小时</span>
            <span id="visible-count">📊 显示：0 个电台</span>
        </div>
    </div>
    
    <script>
        // ===== 初始化 =====
        let map;
        let markers = [];
        let spotData = [];
        let autoSpotTimer = null;
        let startTime = Date.now();
        
        // 模拟 DXCC 实体和坐标
        const dxccLocations = [
            { call: 'JA', name: 'Japan', lat: 35.68, lng: 139.69 },
            { call: 'VK', name: 'Australia', lat: -33.87, lng: 151.21 },
            { call: 'ZL', name: 'New Zealand', lat: -41.29, lng: 174.78 },
            { call: 'HL', name: 'South Korea', lat: 37.57, lng: 126.98 },
            { call: 'BV', name: 'Taiwan', lat: 25.04, lng: 121.51 },
            { call: 'VR2', name: 'Hong Kong', lat: 22.28, lng: 114.16 },
            { call: '9V', name: 'Singapore', lat: 1.29, lng: 103.85 },
            { call: '9M2', name: 'Malaysia', lat: 3.14, lng: 101.69 },
            { call: 'HS', name: 'Thailand', lat: 13.76, lng: 100.52 },
            { call: 'DU', name: 'Philippines', lat: 14.59, lng: 120.98 },
            { call: 'UA9', name: 'Asiatic Russia', lat: 56.85, lng: 60.61 },
            { call: 'UN', name: 'Kazakhstan', lat: 51.17, lng: 71.43 },
            { call: 'RA', name: 'European Russia', lat: 55.76, lng: 37.63 },
            { call: 'DL', name: 'Germany', lat: 52.52, lng: 13.41 },
            { call: 'G', name: 'England', lat: 51.51, lng: -0.13 },
            { call: 'F', name: 'France', lat: 48.86, lng: 2.35 },
            { call: 'I', name: 'Italy', lat: 41.90, lng: 12.48 },
            { call: 'EA', name: 'Spain', lat: 40.42, lng: -3.70 },
            { call: 'W', name: 'USA', lat: 38.90, lng: -77.04 },
            { call: 'VE', name: 'Canada', lat: 45.42, lng: -75.70 },
            { call: 'PY', name: 'Brazil', lat: -23.55, lng: -46.63 },
            { call: 'CX', name: 'Uruguay', lat: -34.88, lng: -56.18 },
            { call: 'LU', name: 'Argentina', lat: -34.60, lng: -58.38 },
            { call: 'CE', name: 'Chile', lat: -33.45, lng: -70.67 },
        ];
        
        const bands = ['160m', '80m', '40m', '30m', '20m', '17m', '15m', '12m', '10m', '6m'];
        const modes = ['CW', 'SSB', 'FT8', 'FT4', 'RTTY'];
        
        // 初始化地图
        function initMap() {
            map = L.map('map', {
                center: [35, 100],
                zoom: 4,
                minZoom: 2,
                maxZoom: 8,
                zoomControl: false,
                attributionControl: false
            });
            
            L.control.zoom({ position: 'bottomright' }).addTo(map);
            
            // 深色地图瓦片
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                maxZoom: 19
            }).addTo(map);
            
            // 添加标记层
            markers = L.layerGroup().addTo(map);
        }
        
        // ===== Spot 生成器 =====
        function generateSpot() {
            const location = dxccLocations[Math.floor(Math.random() * dxccLocations.length)];
            const band = bands[Math.floor(Math.random() * bands.length)];
            const mode = modes[Math.floor(Math.random() * modes.length)];
            const freq = getFrequency(band);
            
            // 添加一些随机偏移
            const lat = location.lat + (Math.random() - 0.5) * 5;
            const lng = location.lng + (Math.random() - 0.5) * 5;
            
            const spot = {
                id: Date.now() + Math.random(),
                call: location.call + String.fromCharCode(65 + Math.floor(Math.random() * 26)) + (Math.floor(Math.random() * 1000) + 1),
                freq: freq,
                band: band,
                mode: mode,
                dxcc: location.name,
                lat: lat,
                lng: lng,
                time: new Date(),
                score: Math.floor(Math.random() * 40) + 60
            };
            
            return spot;
        }
        
        function getFrequency(band) {
            const freqs = {
                '160m': 1.850, '80m': 3.750, '40m': 7.100, '30m': 10.140,
                '20m': 14.074, '17m': 18.100, '15m': 21.074, '12m': 24.915,
                '10m': 28.074, '6m': 50.313
            };
            return freqs[band] + (Math.random() * 0.030);
        }
        
        // 添加 Spot 到地图
        function addSpotToMap(spot) {
            spotData.push(spot);
            
            const icon = L.divIcon({
                className: 'spot-marker',
                html: `<div class="spot-pin"><div class="spot-dot" style="--pin-color: var(--accent-primary)"></div></div>`,
                iconSize: [20, 20],
                iconAnchor: [10, 10]
            });
            
            const marker = L.marker([spot.lat, spot.lng], { icon: icon });
            marker.bindPopup(createPopupContent(spot));
            marker.addTo(markers);
            
            updateStats();
            checkAlerts(spot);
        }
        
        function createPopupContent(spot) {
            return `
                <div class="spot-popup">
                    <div class="spot-popup-title">${spot.call}</div>
                    <div class="spot-popup-row">
                        <span class="spot-popup-label">频率:</span>
                        <span class="spot-popup-value">${spot.freq.toFixed(3)} MHz</span>
                    </div>
                    <div class="spot-popup-row">
                        <span class="spot-popup-label">波段:</span>
                        <span class="spot-popup-value">${spot.band}</span>
                    </div>
                    <div class="spot-popup-row">
                        <span class="spot-popup-label">模式:</span>
                        <span class="spot-popup-value">${spot.mode}</span>
                    </div>
                    <div class="spot-popup-row">
                        <span class="spot-popup-label">DXCC:</span>
                        <span class="spot-popup-value">${spot.dxcc}</span>
                    </div>
                    <div class="spot-popup-row">
                        <span class="spot-popup-label">评分:</span>
                        <span class="spot-popup-value" style="color: var(--accent-success)">${spot.score}</span>
                    </div>
                </div>
            `;
        }
        
        // 更新统计
        function updateStats() {
            // 按波段统计
            const bandCounts = {};
            bands.forEach(b => bandCounts[b] = 0);
            spotData.forEach(s => {
                if (bandCounts[s.band] !== undefined) bandCounts[s.band]++;
            });
            
            // 更新波段计数
            bands.forEach(band => {
                const countEl = document.getElementById(`count-${band}`);
                if (countEl && bandCounts[band] > 0) {
                    countEl.textContent = bandCounts[band];
                }
            });
            
            // 更新总数
            document.getElementById('total-spots').textContent = spotData.length;
            
            // 计算活跃波段数
            const activeBands = Object.values(bandCounts).filter(c => c > 0).length;
            document.getElementById('active-bands').textContent = activeBands;
            
            // 更新可见数量
            document.getElementById('visible-count').textContent = `📊 显示：${spotData.length} 个电台`;
            
            // 更新运行时间
            const minutes = Math.floor((Date.now() - startTime) / 60000);
            const hours = Math.floor(minutes / 60);
            const mins = minutes % 60;
            document.getElementById('uptime').textContent = `${hours}h ${mins}m`;
        }
        
        // 波段筛选
        function filterBand(band) {
            document.querySelectorAll('.band-btn').forEach(btn => btn.classList.remove('active'));
            event.target.closest('.band-btn').classList.add('active');
            console.log('Filter band:', band);
        }
        
        // 检查预警
        function checkAlerts(spot) {
            const watchlist = ['JA', 'VK', 'ZL'];
            if (watchlist.some(w => spot.call.startsWith(w))) {
                addAlert(spot.call, spot.freq, spot.dxcc, 'urgent');
            }
        }
        
        // 添加预警
        function addAlert(call, freq, dxcc, priority) {
            const container = document.getElementById('alert-container');
            const alert = document.createElement('div');
            alert.className = 'alert-item';
            alert.innerHTML = `
                <div class="alert-title">
                    <span class="alert-badge ${priority}">${priority === 'urgent' ? '紧急' : priority === 'important' ? '重要' : '普通'}</span>
                    ${call} on ${freq.toFixed(3)} MHz
                </div>
                <div class="alert-detail">${dxcc} • 刚刚</div>
            `;
            container.insertBefore(alert, container.firstChild);
            
            const count = document.querySelectorAll('.alert-item').length;
            document.getElementById('alert-badge').textContent = count;
        }
        
        // 添加推荐机会
        function addOpportunity(call, dxcc, band, score) {
            const container = document.getElementById('opportunity-container');
            const opp = document.createElement('div');
            opp.className = 'opportunity-item';
            opp.innerHTML = `
                <div>
                    <div class="opp-call">${call}</div>
                    <div class="opp-info">${dxcc} • ${band}</div>
                </div>
                <div class="opp-score">${score}</div>
            `;
            container.appendChild(opp);
        }
        
        // Tab 切换
        function switchTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-panel').forEach(panel => panel.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('tab-' + tabName).classList.add('active');
        }
        
        // 主题切换
        function toggleThemePanel() {
            document.getElementById('theme-panel').classList.toggle('show');
        }
        
        function setTheme(themeName) {
            document.documentElement.setAttribute('data-theme', themeName);
            localStorage.setItem('dx-guardian-theme', themeName);
            document.querySelectorAll('.theme-option').forEach(opt => {
                opt.classList.toggle('active', opt.dataset.theme === themeName);
            });
            document.getElementById('theme-panel').classList.remove('show');
        }
        
        const savedTheme = localStorage.getItem('dx-guardian-theme') || 'blue';
        setTheme(savedTheme);
        
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.theme-selector')) {
                document.getElementById('theme-panel').classList.remove('show');
            }
        });
        
        function toggleAutoSpots() {
            if (autoSpotTimer) {
                clearInterval(autoSpotTimer);
                autoSpotTimer = null;
                return;
            }
            
            autoSpotTimer = setInterval(() => {
                const spot = generateSpot();
                addSpotToMap(spot);
            }, 2000);
        }
        
        function clearSpots() {
            markers.clearLayers();
            spotData = [];
            updateStats();
        }
        
        function refreshSolar() {
            document.getElementById('solar-sfi').textContent = 150 + Math.floor(Math.random() * 20);
            document.getElementById('solar-ssn').textContent = 80 + Math.floor(Math.random() * 20);
            document.getElementById('solar-k').textContent = (1 + Math.random() * 3).toFixed(1);
            document.getElementById('solar-a').textContent = 10 + Math.floor(Math.random() * 20);
        }
        
        function addWatchlistItem() {
            const container = document.getElementById('watchlist-container');
            const items = [
                { call: 'JA1AAA', type: '呼号' },
                { call: 'DXCC', type: 'Japan' },
                { call: 'Band', type: '20m' },
                { call: 'Mode', type: 'FT8' }
            ];
            const item = items[Math.floor(Math.random() * items.length)];
            
            const el = document.createElement('div');
            el.className = 'watchlist-item';
            el.innerHTML = `
                <div>
                    <div class="wl-call">${item.call}</div>
                    <div class="wl-type">${item.type}</div>
                </div>
            `;
            container.appendChild(el);
        }
        
        // ===== 初始化 =====
        window.addEventListener('DOMContentLoaded', function() {
            initMap();
            
            addWatchlistItem();
            addWatchlistItem();
            addWatchlistItem();
            
            addOpportunity('JA8', 'Japan', '15m', 95);
            addOpportunity('VK6', 'Australia', '20m', 88);
            addOpportunity('ZL', 'New Zealand', '40m', 82);
            addOpportunity('HL', 'South Korea', '10m', 76);
            
            // 初始批量添加 Spot
            for (let i = 0; i < 15; i++) {
                setTimeout(() => {
                    const spot = generateSpot();
                    addSpotToMap(spot);
                }, i * 100);
            }
        });
    </script>
</body>
</html>
