<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DX Guardian 重建 Demo V3 - 主题选择</title>
    <style>
        /* ===== 默认主题：科技蓝 ===== */
        :root[data-theme="blue"] {
            --bg-primary: #0a0e1a;
            --bg-secondary: #111827;
            --bg-card: #1f2937;
            --bg-card-hover: #374151;
            
            --accent-primary: #3b82f6;
            --accent-glow: #60a5fa;
            --accent-success: #10b981;
            --accent-warning: #f59e0b;
            --accent-danger: #ef4444;
            --accent-purple: #8b5cf6;
            
            --gradient-accent: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            --gradient-success: linear-gradient(135deg, #10b981 0%, #34d399 100%);
            --gradient-danger: linear-gradient(135deg, #ef4444 0%, #f87171 100%);
        }
        
        /* 主题 2: 暗夜紫 */
        :root[data-theme="purple"] {
            --bg-primary: #0f0a1f;
            --bg-secondary: #1a1025;
            --bg-card: #2d1f3d;
            --bg-card-hover: #3d2a52;
            
            --accent-primary: #a78bfa;
            --accent-glow: #c4b5fd;
            --accent-success: #34d399;
            --accent-warning: #fbbf24;
            --accent-danger: #f472b6;
            --accent-purple: #c084fc;
            
            --gradient-accent: linear-gradient(135deg, #a78bfa 0%, #c084fc 100%);
            --gradient-success: linear-gradient(135deg, #34d399 0%, #6ee7b7 100%);
            --gradient-danger: linear-gradient(135deg, #f472b6 0%, #fb7185 100%);
        }
        
        /* 主题 3: 翡翠绿 */
        :root[data-theme="green"] {
            --bg-primary: #051a0f;
            --bg-secondary: #0a291a;
            --bg-card: #143d2a;
            --bg-card-hover: #1f523a;
            
            --accent-primary: #10b981;
            --accent-glow: #34d399;
            --accent-success: #34d399;
            --accent-warning: #fbbf24;
            --accent-danger: #f87171;
            --accent-purple: #60a5fa;
            
            --gradient-accent: linear-gradient(135deg, #10b981 0%, #34d399 100%);
            --gradient-success: linear-gradient(135deg, #34d399 0%, #6ee7b7 100%);
            --gradient-danger: linear-gradient(135deg, #f87171 0%, #fca5a5 100%);
        }
        
        /* 主题 4: 烈焰红 */
        :root[data-theme="red"] {
            --bg-primary: #1a0a0a;
            --bg-secondary: #291010;
            --bg-card: #3d1f1f;
            --bg-card-hover: #522a2a;
            
            --accent-primary: #ef4444;
            --accent-glow: #f87171;
            --accent-success: #fbbf24;
            --accent-warning: #f59e0b;
            --accent-danger: #dc2626;
            --accent-purple: #f472b6;
            
            --gradient-accent: linear-gradient(135deg, #ef4444 0%, #f87171 100%);
            --gradient-success: linear-gradient(135deg, #fbbf24 0%, #fcd34d 100%);
            --gradient-danger: linear-gradient(135deg, #dc2626 0%, #ef4444 100%);
        }
        
        /* 主题 5: 深空灰 */
        :root[data-theme="gray"] {
            --bg-primary: #0a0a0a;
            --bg-secondary: #111111;
            --bg-card: #1a1a1a;
            --bg-card-hover: #2a2a2a;
            
            --accent-primary: #6b7280;
            --accent-glow: #9ca3af;
            --accent-success: #10b981;
            --accent-warning: #f59e0b;
            --accent-danger: #ef4444;
            --accent-purple: #8b5cf6;
            
            --gradient-accent: linear-gradient(135deg, #4b5563 0%, #6b7280 100%);
            --gradient-success: linear-gradient(135deg, #10b981 0%, #34d399 100%);
            --gradient-danger: linear-gradient(135deg, #ef4444 0%, #f87171 100%);
        }
        
        /* Ocean 主题 */
        :root[data-theme="ocean"] {
            --bg-primary: #001a33;
            --bg-secondary: #002244;
            --bg-card: #003366;
            --bg-card-hover: #004477;
            
            --accent-primary: #00b4d8;
            --accent-glow: #90e0ef;
            --accent-success: #2ec4b6;
            --accent-warning: #ffb703;
            --accent-danger: #ff6b6b;
            --accent-purple: #7209b7;
            
            --gradient-accent: linear-gradient(135deg, #00b4d8 0%, #7209b7 100%);
            --gradient-success: linear-gradient(135deg, #2ec4b6 0%, #48cae4 100%);
            --gradient-danger: linear-gradient(135deg, #ff6b6b 0%, #ff8e8e 100%);
        }
        
        /* ===== 基础样式 ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: #f9fafb;
            overflow: hidden;
        }
        
        /* ===== Top Bar ===== */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 52px;
            background: rgba(17, 24, 39, 0.95);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            z-index: 1000;
            border-bottom: 1px solid rgba(148, 163, 184, 0.2);
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 16px;
            font-weight: bold;
            background: var(--gradient-accent);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .logo-icon {
            font-size: 20px;
            animation: rotate-satellite 10s linear infinite;
        }
        
        @keyframes rotate-satellite {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .band-filter {
            display: flex;
            gap: 6px;
            overflow-x: auto;
        }
        
        .band-btn {
            padding: 4px 10px;
            background: var(--bg-card);
            border: 1px solid rgba(148, 163, 184, 0.1);
            color: #9ca3af;
            border-radius: 6px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        
        .band-btn:hover {
            background: var(--bg-card-hover);
            border-color: var(--accent-glow);
        }
        
        .band-btn.active {
            background: var(--gradient-accent);
            border-color: transparent;
            color: white;
        }
        
        .band-count {
            background: rgba(255,255,255,0.2);
            padding: 1px 4px;
            border-radius: 4px;
            font-size: 9px;
            margin-left: 4px;
        }
        
        .top-bar-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        /* 主题选择器 */
        .theme-selector {
            position: relative;
        }
        
        .theme-btn {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-card);
            border: 1px solid rgba(148, 163, 184, 0.1);
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s;
        }
        
        .theme-btn:hover {
            background: var(--bg-card-hover);
            transform: scale(1.05);
        }
        
        .theme-panel {
            position: absolute;
            top: 40px;
            right: 0;
            background: var(--bg-card);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 12px;
            padding: 12px;
            display: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 1001;
            animation: theme-panel-enter 0.3s ease;
        }
        
        @keyframes theme-panel-enter {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .theme-panel.show {
            display: block;
        }
        
        .theme-panel-title {
            font-size: 12px;
            font-weight: bold;
            color: #f9fafb;
            margin-bottom: 10px;
            padding-bottom: 6px;
            border-bottom: 1px solid rgba(148, 163, 184, 0.1);
        }
        
        .theme-options {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }
        
        .theme-option {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }
        
        .theme-option:hover {
            transform: scale(1.1);
            border-color: white;
        }
        
        .theme-option.active {
            border-color: white;
            box-shadow: 0 0 12px rgba(255,255,255,0.5);
        }
        
        .theme-option[data-theme="blue"] {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
        }
        
        .theme-option[data-theme="purple"] {
            background: linear-gradient(135deg, #a78bfa 0%, #c084fc 100%);
        }
        
        .theme-option[data-theme="green"] {
            background: linear-gradient(135deg, #10b981 0%, #34d399 100%);
        }
        
        .theme-option[data-theme="red"] {
            background: linear-gradient(135deg, #ef4444 0%, #f87171 100%);
        }
        
        .theme-option[data-theme="gray"] {
            background: linear-gradient(135deg, #4b5563 0%, #6b7280 100%);
        }
        
        .theme-option[data-theme="ocean"] {
            background: linear-gradient(135deg, #00b4d8 0%, #7209b7 100%);
        }
        
        .theme-option .theme-name {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            font-size: 7px;
            text-align: center;
            color: white;
            background: rgba(0,0,0,0.5);
            padding: 1px;
        }
        
        .notification-btn {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-card);
            border: 1px solid rgba(148, 163, 184, 0.1);
            border-radius: 8px;
            cursor: pointer;
            position: relative;
        }
        
        .notification-btn .badge {
            position: absolute;
            top: -4px;
            right: -4px;
            background: var(--gradient-danger);
            color: white;
            font-size: 9px;
            font-weight: bold;
            padding: 2px 5px;
            border-radius: 8px;
        }
        
        .icon-btn {
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-card);
            border: 1px solid rgba(148, 163, 184, 0.1);
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        
        /* ===== Main Layout ===== */
        .main-container {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 12px;
            padding: 60px 12px 12px;
            height: 100vh;
        }
        
        .left-area {
            position: relative;
            display: grid;
            grid-template-columns: 220px 1fr;
            gap: 12px;
        }
        
        .card {
            background: var(--bg-card);
            border: 1px solid rgba(148, 163, 184, 0.1);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.4);
        }
        
        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            background: var(--gradient-accent);
            color: white;
            font-size: 12px;
            font-weight: bold;
        }
        
        .card-body {
            padding: 12px;
        }
        
        /* Map */
        .map-container {
            position: relative;
            background: var(--bg-secondary);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(148, 163, 184, 0.2);
        }
        
        .map-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 16px;
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
        }
        
        .map-icon {
            font-size: 60px;
            opacity: 0.3;
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .map-text {
            font-size: 16px;
            color: #9ca3af;
            opacity: 0.6;
        }
        
        /* Solar Card */
        .solar-card {
            position: absolute;
            top: 0;
            left: 0;
            width: 220px;
            z-index: 100;
        }
        
        .solar-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }
        
        .solar-stat {
            text-align: center;
            padding: 8px;
            background: var(--bg-secondary);
            border-radius: 6px;
            border: 1px solid rgba(148, 163, 184, 0.1);
        }
        
        .stat-label {
            font-size: 9px;
            color: #6b7280;
        }
        
        .stat-value {
            font-size: 18px;
            font-weight: bold;
            margin: 4px 0;
            background: var(--gradient-accent);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        /* Right Panel */
        .right-panel {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .card-tabs {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        .tab-header {
            display: flex;
            gap: 0;
            background: var(--bg-secondary);
            padding: 3px;
        }
        
        .tab-btn {
            flex: 1;
            padding: 8px 6px;
            background: transparent;
            border: none;
            color: #9ca3af;
            cursor: pointer;
            border-radius: 6px;
            font-size: 11px;
        }
        
        .tab-btn.active {
            background: var(--gradient-accent);
            color: white;
        }
        
        .tab-content {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }
        
        .tab-panel {
            display: none;
        }
        
        .tab-panel.active {
            display: block;
        }
        
        /* Spot Marker */
        .spot-marker {
            position: absolute;
            width: 14px;
            height: 14px;
        }
        
        .spot-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--gradient-accent);
            border: 3px solid white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.5), 0 0 12px var(--accent-glow);
            cursor: pointer;
        }
        
        .spot-pulse {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: var(--accent-primary);
            opacity: 0;
            animation: pulse-ring 2s ease-out infinite;
        }
        
        @keyframes pulse-ring {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0.6; }
            100% { transform: translate(-50%, -50%) scale(2.5); opacity: 0; }
        }
        
        /* Watchlist Item */
        .watchlist-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            background: var(--bg-secondary);
            border-radius: 6px;
            margin-bottom: 6px;
            border-left: 3px solid var(--accent-success);
        }
        
        .wl-call {
            font-weight: bold;
            color: #f9fafb;
            font-size: 12px;
        }
        
        .wl-type {
            font-size: 9px;
            color: #6b7280;
            padding: 1px 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
        }
        
        .btn-add {
            width: 100%;
            padding: 6px;
            background: var(--bg-secondary);
            border: 1px dashed rgba(148, 163, 184, 0.2);
            color: #6b7280;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
        }
        
        .alert-item {
            padding: 8px;
            background: var(--bg-secondary);
            border-radius: 6px;
            margin-bottom: 6px;
            border-left: 3px solid var(--accent-danger);
        }
        
        .alert-badge {
            display: inline-block;
            font-size: 8px;
            padding: 1px 3px;
            border-radius: 3px;
            background: var(--gradient-danger);
            color: white;
            margin-right: 4px;
        }
        
        .opportunity-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px;
            background: var(--bg-secondary);
            border-radius: 6px;
            margin-bottom: 6px;
        }
        
        .opp-score {
            background: var(--gradient-success);
            color: white;
            font-size: 11px;
            font-weight: bold;
            padding: 3px 8px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <header class="top-bar">
        <div style="display: flex; align-items: center; gap: 12px;">
            <div class="logo">
                <span class="logo-icon">📡</span>
                <span class="logo-text">DX Guardian</span>
            </div>
            <div class="band-filter">
                <button class="band-btn">全部</button>
                <button class="band-btn">20m</button>
                <button class="band-btn active">15m <span class="band-count">5</span></button>
                <button class="band-btn">10m</button>
            </div>
        </div>
        
        <div class="top-bar-right">
            <div style="display: flex; align-items: center; gap: 6px; padding: 4px 10px; background: var(--bg-card); border-radius: 16px; font-size: 11px;">
                <span style="width: 6px; height: 6px; background: var(--accent-success); border-radius: 50%; box-shadow: 0 0 6px var(--accent-success);"></span>
                <span>已连接</span>
            </div>
            
            <!-- 主题选择器 -->
            <div class="theme-selector">
                <button class="theme-btn" onclick="toggleThemePanel()" title="选择主题">🎨</button>
                <div class="theme-panel" id="theme-panel">
                    <div class="theme-panel-title">选择主题</div>
                    <div class="theme-options">
                        <div class="theme-option active" data-theme="blue" onclick="setTheme('blue')">
                            <div class="theme-name">科技蓝</div>
                        </div>
                        <div class="theme-option" data-theme="purple" onclick="setTheme('purple')">
                            <div class="theme-name">暗夜紫</div>
                        </div>
                        <div class="theme-option" data-theme="green" onclick="setTheme('green')">
                            <div class="theme-name">翡翠绿</div>
                        </div>
                        <div class="theme-option" data-theme="red" onclick="setTheme('red')">
                            <div class="theme-name">烈焰红</div>
                        </div>
                        <div class="theme-option" data-theme="gray" onclick="setTheme('gray')">
                            <div class="theme-name">深空灰</div>
                        </div>
                        <div class="theme-option" data-theme="ocean" onclick="setTheme('ocean')">
                            <div class="theme-name">海洋蓝</div>
                        </div>
                    </div>
                </div>
            </div>
            
            <button class="notification-btn">
                <span>🔔</span>
                <span class="badge">3</span>
            </button>
            <button class="icon-btn">⚙️</button>
        </div>
    </header>
    
    <div class="main-container">
        <div class="left-area">
            <div class="card solar-card">
                <div class="card-header">
                    <span>☀️ 太阳数据</span>
                </div>
                <div class="card-body">
                    <div class="solar-grid">
                        <div class="solar-stat">
                            <div class="stat-label">SFI</div>
                            <div class="stat-value">156</div>
                        </div>
                        <div class="solar-stat">
                            <div class="stat-label">SSN</div>
                            <div class="stat-value">88</div>
                        </div>
                        <div class="solar-stat">
                            <div class="stat-label">K</div>
                            <div class="stat-value">2.1</div>
                        </div>
                        <div class="solar-stat">
                            <div class="stat-label">A</div>
                            <div class="stat-value">12</div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="map-container">
                <div class="map-placeholder">
                    <div class="map-icon">🌍</div>
                    <div class="map-text">Leaflet 地图区域</div>
                    <button onclick="addSpotDemo()" style="padding: 8px 20px; background: var(--gradient-accent); border: none; color: white; border-radius: 8px; cursor: pointer;">
                        ✨ 添加 Spot
                    </button>
                </div>
                <div id="spot-container"></div>
            </div>
        </div>
        
        <div class="right-panel">
            <div class="card">
                <div class="card-header">🔌 系统状态</div>
                <div class="card-body">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 6px;">
                        <div style="padding: 6px; background: var(--bg-secondary); border-radius: 6px;">
                            <div style="font-size: 9px; color: #6b7280;">Spot 总数</div>
                            <div style="font-size: 16px; font-weight: bold; color: #f9fafb;">847</div>
                        </div>
                        <div style="padding: 6px; background: var(--bg-secondary); border-radius: 6px;">
                            <div style="font-size: 9px; color: #6b7280;">活跃波段</div>
                            <div style="font-size: 16px; font-weight: bold; color: var(--accent-success);">6</div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="card">
                <div class="card-header">📡 我的台站</div>
                <div class="card-body">
                    <div style="font-size: 11px; color: #6b7280; padding: 3px 0;">呼号：<span style="color: #f9fafb; font-weight: bold;">BG2ENW</span></div>
                    <div style="font-size: 11px; color: #6b7280; padding: 3px 0;">Grid: <span style="color: #f9fafb; font-weight: bold;">PN35HS</span></div>
                </div>
            </div>
            
            <div class="card card-tabs">
                <div class="tab-header">
                    <button class="tab-btn active" onclick="switchTab('watchlist')">🎯 关注</button>
                    <button class="tab-btn" onclick="switchTab('alerts')">🔔 预警</button>
                    <button class="tab-btn" onclick="switchTab('opportunities')">✨ 推荐</button>
                </div>
                <div class="tab-content">
                    <div class="tab-panel active" id="tab-watchlist">

                        <div class="watchlist-item" style="border-left-color: var(--accent-purple);">
                            <div>
                                <div class="wl-call">DXCC</div>
                                <div class="wl-type">Japan</div>
                            </div>
                        </div>
                        <button class="btn-add">+ 添加关注</button>
                    </div>
                    
                    <div class="tab-panel" id="tab-alerts">
                        <div class="alert-item">
                            <div style="font-weight: bold; font-size: 11px; color: #f9fafb; margin-bottom: 3px;">
                                <span class="alert-badge">紧急</span>JA1AAA on 14.074 MHz
                            </div>
                            <div style="font-size: 10px; color: #9ca3af;">2 分钟前</div>
                        </div>
                    </div>
                    
                    <div class="tab-panel" id="tab-opportunities">
                        <div class="opportunity-item">

                            <div class="opp-score">95</div>

        </div>
    </div>
    
    <script>
        // Tab 切换
        function switchTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-panel').forEach(panel => panel.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('tab-' + tabName).classList.add('active');
        }
        
        // 主题面板
        function toggleThemePanel() {
            document.getElementById('theme-panel').classList.toggle('show');
        }
        
        // 设置主题
        function setTheme(themeName) {
            document.documentElement.setAttribute('data-theme', themeName);
            localStorage.setItem('dx-guardian-theme', themeName);
            
            // 更新 active 状态
            document.querySelectorAll('.theme-option').forEach(opt => {
                opt.classList.toggle('active', opt.dataset.theme === themeName);
            });
            
            // 关闭面板
            document.getElementById('theme-panel').classList.remove('show');
        }
        
        // 加载保存的主题
        const savedTheme = localStorage.getItem('dx-guardian-theme') || 'blue';
        setTheme(savedTheme);
        
        // 点击外部关闭面板
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.theme-selector')) {
                document.getElementById('theme-panel').classList.remove('show');
            }
        });
        
        // Spot 演示
        function addSpotDemo() {
            const container = document.getElementById('spot-container');
            const spot = document.createElement('div');
            spot.className = 'spot-marker';
            spot.style.left = (10 + Math.random() * 80) + '%';
            spot.style.top = (10 + Math.random() * 80) + '%';
            spot.innerHTML = '<div class="spot-dot"></div><div class="spot-pulse"></div>';
            container.appendChild(spot);
        }
        
        setTimeout(() => {
            for (let i = 0; i < 5; i++) {
                setTimeout(() => addSpotDemo(), i * 200);
            }
        }, 500);
    </script>
</body>
</html>
