<!DOCTYPE html>
<html lang="zh-CN" data-theme="blue-dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test</title>
    <style>
        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #111827;
            --bg-card: #1f2937;
            --text-primary: #f9fafb;
            --border-medium: rgba(148, 163, 184, 0.2);
        }
        body {
            background: #0a0e1a !important;
            color: #f9fafb !important;
            margin: 0;
            padding: 20px;
            font-family: sans-serif;
        }
        .card {
            background: #1f2937 !important;
            border: 2px solid rgba(148, 163, 184, 0.5) !important;
            padding: 20px;
            margin: 10px 0;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <h1>配色测试页面</h1>
    <div class="card">
        <h2>测试卡片</h2>
        <p>如果你能看到这段文字，说明配色正常。</p>
        <p>背景应该是深蓝色 #0a0e1a</p>
        <p>卡片背景应该是深蓝灰 #1f2937</p>
        <p>文字应该是白色 #f9fafb</p>
    </div>
</body>
</html>
